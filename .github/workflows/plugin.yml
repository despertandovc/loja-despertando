name: Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: |
          set -euo pipefail
          php -v
          find plugins/despertando-commerce-core -name '*.php' -print0 | xargs -0 -n1 php -l
